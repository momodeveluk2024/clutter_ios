name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: 1.0.1

jobs:
  build-ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - run: pod repo update
        working-directory: ios

      - name: Build iOS app
        run: >
          flutter build ios --release --no-codesign
          --build-name=${{ env.APP_VERSION }}
          --build-number=${{ github.run_number }}

      - run: mkdir Payload
        working-directory: build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: build/ios/iphoneos

      - name: Zip output
        run: zip -qq -r -9 Nutrimate-${{ env.APP_VERSION }}-${{ github.run_number }}.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/Nutrimate-${{ env.APP_VERSION }}-${{ github.run_number }}.ipa
          asset_name: Nutrimate-${{ env.APP_VERSION }}-${{ github.run_number }}.ipa
          tag: ios-v${{ env.APP_VERSION }}-${{ github.run_number }}
          overwrite: false
          body: "Nutrimate iOS build ${{ github.run_number }}."
